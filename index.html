<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitvalder Art - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="page-wrapper">
        <!-- Hero Section -->
        <section id="hero">
        <div class="social-media-icons">
            <a href="https://x.com" target="_blank" rel="noopener noreferrer" title="X (formerly Twitter)">
                <img src="img/x_logo.png" alt="X Logo" class="social-icon">
            </a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" title="Instagram">
                <img src="img/iglogo.png" alt="Instagram Logo" class="social-icon">
            </a>
        </div>
        <div class="branding-background">
            <svg viewBox="0 0 1200 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                <defs>
                    <clipPath id="branding-fill-clip" clipPathUnits="userSpaceOnUse">
                        <rect class="branding-fill-mask" x="-40" y="0" width="0" height="220" />
                    </clipPath>
                </defs>
                <text class="branding-stroke" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">vitvalder.art</text>
                <g clip-path="url(#branding-fill-clip)">
                    <text class="branding-fill" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">vitvalder.art</text>
                </g>
            </svg>
        </div>
        <div class="hero-content">
            <div class="hero-logo-text">
                <img src="img/vvlogo_white.png" alt="Vitvalder Logo" class="hero-logo">
                <h1 class="hero-title">Vít Valder</h1>
            </div>
            <p class="hero-subtitle">Digital Artist</p>
        </div>
        <div class="scroll-indicator">
            <img src="img/arrow_down.png" alt="Scroll Down" class="arrow-down">
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="reveal">
        <div class="container">
            <div class="grid">
                <a href="projects.html" class="card photo-card" data-category="grafika" style="text-decoration: none; color: inherit;">
                    <div class="card-image" style="background-image: url('img/photoshop.png');"></div>
                    <div class="card-overlay"></div>
                    <h3 class="card-title">Grafika</h3>
                </a>
                <a href="video.html" class="card photo-card" data-category="video" style="text-decoration: none; color: inherit;">
                    <div class="card-image" style="background-image: url('img/davinci.png');"></div>
                    <div class="card-overlay"></div>
                    <h3 class="card-title">Video</h3>
                </a>
                <a href="foto.html" class="card photo-card" data-category="foto" style="text-decoration: none; color: inherit;">
                    <div class="card-image" style="background-image: url('img/foto_foto.png');"></div>
                    <div class="card-overlay"></div>
                    <h3 class="card-title">Foto</h3>
                </a>
                <div class="card" data-category="branding">
                    <div class="card-image" style="background-image: url('img/branding.jpg');"></div>
                    <div class="card-overlay"></div>
                    <h3 class="card-title">Branding</h3>
                </div>
                <div class="card" data-category="social-media">
                    <div class="card-image" style="background-image: url('img/social-media.jpg');"></div>
                    <div class="card-overlay"></div>
                    <h3 class="card-title">Social Media</h3>
                </div>
                <a href="work.html" class="card photo-card" data-category="projekty" style="text-decoration: none; color: inherit;">
                    <div class="card-image" style="background-image: url('img/vitek.png');"></div>
                    <div class="card-overlay"></div>
                    <h3 class="card-title">Pracovní zkušenosti</h3>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer" class="reveal">
        <h2 class="footer-title">Pojďme spolupracovat</h2>
        <div class="footer-background">
            <svg viewBox="0 0 1200 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                <defs>
                    <clipPath id="footer-fill-clip" clipPathUnits="userSpaceOnUse">
                        <rect class="footer-fill-mask" x="-40" y="0" width="0" height="220" />
                    </clipPath>
                </defs>
                <text class="footer-stroke" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">kontakt</text>
                <g clip-path="url(#footer-fill-clip)">
                    <text class="footer-fill" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">kontakt</text>
                </g>
            </svg>
        </div>
        <img src="img/vvlogo_green.png" alt="VV Logo" class="footer-logo">
        <p class="footer-contact"><a href="mailto:info@vitvalder.art">info@vitvalder.art</a></p>
        <div class="footer-social-media-icons">
            <a href="https://x.com" target="_blank" rel="noopener noreferrer" title="X (formerly Twitter)">
                <img src="img/x_logo.png" alt="X Logo" class="footer-social-icon">
            </a>
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" title="Instagram">
                <img src="img/iglogo.png" alt="Instagram Logo" class="footer-social-icon">
            </a>
        </div>
        <p class="footer-copyright">&copy; 2026 Vitvalder Art. All rights reserved.</p>
    </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
